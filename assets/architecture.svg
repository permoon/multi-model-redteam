<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <!-- Title strip -->
  <text x="440" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b" letter-spacing="3">MULTI-MODEL DESIGN RED TEAM</text>
  <text x="440" y="54" text-anchor="middle" font-size="14" fill="#94a3b8">three LLMs review the same plan in parallel · whatever one misses, the other two often catch</text>

  <!-- Input plan -->
  <rect x="340" y="84" width="200" height="58" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="440" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">plan.md / spec / RFC</text>
  <text x="440" y="128" text-anchor="middle" font-size="12" fill="#64748b">your design under review</text>

  <!-- Fan-out lines -->
  <text x="440" y="166" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">same prompt · in parallel · no cross-talk</text>
  <line x1="440" y1="142" x2="155" y2="208" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="142" x2="440" y2="208" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="142" x2="725" y2="208" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Three model boxes -->
  <rect x="55" y="212" width="200" height="86" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="155" y="240" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Claude Code</text>
  <text x="155" y="262" text-anchor="middle" font-size="11" fill="#64748b">5-frame review</text>
  <text x="155" y="280" text-anchor="middle" font-size="11" fill="#64748b">finds: ordering, atomicity,</text>
  <text x="155" y="294" text-anchor="middle" font-size="11" fill="#64748b">rollback gaps, alert thresholds</text>

  <rect x="340" y="212" width="200" height="86" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="440" y="240" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Codex CLI</text>
  <text x="440" y="262" text-anchor="middle" font-size="11" fill="#64748b">5-frame review</text>
  <text x="440" y="280" text-anchor="middle" font-size="11" fill="#64748b">finds: idempotency, schema</text>
  <text x="440" y="294" text-anchor="middle" font-size="11" fill="#64748b">drift, transport-layer failures</text>

  <rect x="625" y="212" width="200" height="86" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="725" y="240" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Gemini CLI</text>
  <text x="725" y="262" text-anchor="middle" font-size="11" fill="#64748b">5-frame review</text>
  <text x="725" y="280" text-anchor="middle" font-size="11" fill="#64748b">finds: timezone, partition</text>
  <text x="725" y="294" text-anchor="middle" font-size="11" fill="#64748b">races, GCP-native traps</text>

  <!-- Converge lines into consolidator -->
  <line x1="155" y1="298" x2="440" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="298" x2="440" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="725" y1="298" x2="440" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Consolidator -->
  <rect x="320" y="354" width="240" height="62" rx="8" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  <text x="440" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Consolidate (4th LLM call)</text>
  <text x="440" y="400" text-anchor="middle" font-size="11" fill="#94a3b8">merge by meaning, not by string match</text>

  <!-- Arrow to output -->
  <line x1="440" y1="416" x2="440" y2="446" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Findings output panel -->
  <rect x="180" y="450" width="520" height="92" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>

  <text x="440" y="476" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a" letter-spacing="2">RANKED FINDINGS</text>
  <line x1="220" y1="487" x2="660" y2="487" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Three categories -->
  <text x="220" y="508" font-size="12" fill="#0f172a">●</text>
  <text x="240" y="508" font-size="12" fill="#0f172a" font-weight="600">Consensus</text>
  <text x="324" y="508" font-size="12" fill="#64748b">≥ 2 teams agreed — strongest signal</text>

  <text x="220" y="528" font-size="12" fill="#4f46e5">●</text>
  <text x="240" y="528" font-size="12" fill="#4f46e5" font-weight="700">Unique</text>
  <text x="296" y="528" font-size="12" fill="#4f46e5">1 team only — where single-model review would have missed it</text>

  <!-- Annotation arrow pointing to "Unique" -->
  <path d="M 696 524 Q 740 524 740 500" stroke="#4f46e5" stroke-width="1.5" fill="none" marker-end="url(#arrowAccent)"/>
  <text x="746" y="500" font-size="11" fill="#4f46e5" font-weight="600">value</text>
  <text x="746" y="514" font-size="11" fill="#4f46e5" font-weight="600">compounds</text>

  <!-- Bottom byline -->
  <text x="440" y="572" text-anchor="middle" font-size="12" fill="#64748b">no install · no plugin · ~30 lines in your CLAUDE.md</text>
</svg>
